<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insect Battle Arena</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="selection-screen">
    <div class="container">
        <h1>🦗 Insect Battle Arena 🐜</h1>
        <p>Choose your role to join the game</p>
        
        <div class="roles">
            <a href="/arena" class="role-card host">
                <h2>🖥️ Host Screen</h2>
                <p>Open the split-screen spectator view</p>
            </a>
            
            <a href="/controller?p=1" class="role-card player1">
                <h2>🦗 Play Sprinkhaan</h2>
                <p>Player 1 Controller</p>
            </a>
            
            <a href="/controller?p=2" class="role-card player2">
                <h2>🐜 Play Mier</h2>
                <p>Player 2 Controller</p>
            </a>
        </div>
    </div>
</body>
</html>
